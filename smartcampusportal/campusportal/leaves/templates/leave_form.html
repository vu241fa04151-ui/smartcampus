
<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Apply Leave</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            Smart Campus Portal
        </a>

        <div>
            <a href="/" class="btn btn-light me-2">Home</a>
            <a href="/complaint/view/" class="btn btn-light me-2">Complaints</a>
            <a href="/leave/view/" class="btn btn-light">Leaves</a>
        </div>

    </div>
</nav>
<div class="container mt-5">

<h2>Leave Application</h2>

<form method="POST">
    {% csrf_token %}

    <label>Reason:</label><br>
    <textarea name="reason"></textarea><br><br>

    <label>From Date:</label><br>
    <input type="date" name="from_date"><br><br>

    <label>To Date:</label><br>
    <input type="date" name="to_date"><br><br>

   <button type="submit" class="btn btn-primary">
    Submit
</button>

</form>
</div>
<hr>



<footer class="text-center">

    <p>Smart Campus Service Portal © 2026</p>

</footer> 
</body>
</html>
