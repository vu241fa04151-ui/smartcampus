
<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Submit Complaint</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            Smart Campus Portal
        </a>

        <div>
            <a href="/" class="btn btn-light me-2">Home</a>
            <a href="/complaint/view/" class="btn btn-light me-2">Complaints</a>
            <a href="/leave/view/" class="btn btn-light">Leaves</a>
        </div>

    </div>
</nav>

<h2>Submit Complaint</h2>

<form method="POST">
    {% csrf_token %}

    <label>Title:</label><br>
    <input type="text" name="title"><br><br>
    <label>Student Name:</label><br>
    <input type="text" name="student_name"><br><br>

    <label>Room Number:</label><br>
    <input type="text" name="room_number"><br><br>
    

    <label>Category:</label><br>
    <select name="category">
        <option>Electrical</option>
        <option>Water</option>
        <option>Internet</option>
        <option>Cleaning</option>
    </select><br><br>
    <label>Priority:</label><br>

<select name="priority">
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
</select>

<br><br>

    <label>Description:</label><br>
    <textarea name="description"></textarea><br><br>
    

    <button type="submit" class="btn btn-primary">
    Submit
</button>

</form>
</div>
<hr>



<footer class="text-center">

    <p>Smart Campus Service Portal © 2026</p>

</footer> 
</body>
</html>
